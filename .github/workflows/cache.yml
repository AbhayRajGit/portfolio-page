name: Cache Prime Workflow

on:
  push:
    branches:
      - main

jobs:
  cache-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prime cache
        id: cache-step
        uses: actions/cache@v4
        with:
          path: ~/.cache/demo
          key: cache-cd76b87

      - name: prime-cache-cd76b87
        run: |
          echo "Cache hit: ${{ steps.cache-step.outputs.cache-hit }}"
